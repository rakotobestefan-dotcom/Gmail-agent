<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agent Gmail</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface2: #1e232b;
    --border: #2a3040;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --success: #34d399;
    --danger: #f87171;
    --warning: #fbbf24;
    --text: #e8ecf4;
    --text2: #8a94a8;
    --text3: #4a5568;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 40px;
  }

  /* Header */
  .header {
    padding: 52px 24px 24px;
    background: linear-gradient(180deg, #0a0c10 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-left: 48px;
  }

  /* API Key section */
  .section {
    padding: 0 20px;
    margin-top: 20px;
  }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  input[type="password"], input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 44px 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  .eye-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    margin-top: 10px;
  }

  .status-badge.ok { background: rgba(52,211,153,0.12); color: var(--success); }
  .status-badge.warn { background: rgba(251,191,36,0.12); color: var(--warning); }
  .status-badge.err { background: rgba(248,113,113,0.12); color: var(--danger); }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.8s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Main button */
  .btn-main {
    width: calc(100% - 40px);
    margin: 20px 20px 0;
    padding: 17px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-main:active { transform: scale(0.97); opacity: 0.9; }
  .btn-main:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Loader */
  .loader {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Card email */
  .card {
    margin: 20px 20px 0;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 14px 16px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .card-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .card-icon.recv { background: rgba(79,142,247,0.15); }
  .card-icon.send { background: rgba(124,92,252,0.15); }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text2);
  }

  .card-body { padding: 16px; }

  .meta-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: baseline;
  }

  .meta-key {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    min-width: 50px;
    flex-shrink: 0;
  }

  .meta-val {
    font-size: 13px;
    color: var(--text);
    word-break: break-word;
  }

  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  .msg-body {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text2);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Editable reply */
  .reply-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    outline: none;
    min-height: 140px;
    transition: border-color 0.2s;
  }

  .reply-textarea:focus { border-color: var(--accent2); }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 10px;
    margin: 16px 20px 0;
  }

  .btn-send {
    flex: 1;
    padding: 15px;
    background: linear-gradient(135deg, #34d399, #059669);
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-cancel {
    padding: 15px 20px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-send:active { transform: scale(0.97); }
  .btn-cancel:active { background: var(--surface2); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 99px;
    padding: 12px 22px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(52,211,153,0.4); color: var(--success); }
  .toast.error { border-color: rgba(248,113,113,0.4); color: var(--danger); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* Sent state */
  .sent-banner {
    margin: 20px 20px 0;
    padding: 16px;
    background: rgba(52,211,153,0.08);
    border: 1.5px solid rgba(52,211,153,0.25);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .sent-icon { font-size: 28px; }
  .sent-text h3 { font-size: 15px; font-weight: 600; color: var(--success); }
  .sent-text p { font-size: 13px; color: var(--text2); margin-top: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">✉️</div>
    <h1>Agent Gmail</h1>
  </div>
  <div class="subtitle">Lecture & réponse intelligente</div>
</div>

<div class="section">
  <div class="label">Clé API Anthropic</div>
  <div class="input-wrap">
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
    <button class="eye-btn" onclick="toggleKey()">👁</button>
  </div>
  <div id="keyStatus"></div>
</div>

<button class="btn-main" id="fetchBtn" onclick="fetchEmail()">
  <span id="btnIcon">📬</span>
  <span id="btnText">Lire mon dernier email</span>
  <div class="loader" id="loader"></div>
</button>

<div id="content"></div>

<div class="toast" id="toast"></div>

<script>
let currentDraft = null;
let sending = false;

// Persist API key
const keyInput = document.getElementById('apiKey');
keyInput.value = localStorage.getItem('anthropic_key') || '';
if (keyInput.value) updateKeyStatus(true);

keyInput.addEventListener('input', () => {
  const k = keyInput.value.trim();
  localStorage.setItem('anthropic_key', k);
  updateKeyStatus(k.startsWith('sk-ant-') && k.length > 20);
});

function updateKeyStatus(ok) {
  const el = document.getElementById('keyStatus');
  if (!keyInput.value) { el.innerHTML = ''; return; }
  el.innerHTML = ok
    ? `<span class="status-badge ok"><span class="dot"></span>Clé valide</span>`
    : `<span class="status-badge warn"><span class="dot"></span>Format invalide</span>`;
}

function toggleKey() {
  keyInput.type = keyInput.type === 'password' ? 'text' : 'password';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.className = `toast ${type}`;
  t.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setLoading(on) {
  const btn = document.getElementById('fetchBtn');
  const loader = document.getElementById('loader');
  const icon = document.getElementById('btnIcon');
  const text = document.getElementById('btnText');
  btn.disabled = on;
  loader.style.display = on ? 'block' : 'none';
  icon.style.display = on ? 'none' : 'inline';
  text.textContent = on ? 'Analyse en cours...' : 'Lire mon dernier email';
}

async function fetchEmail() {
  const key = keyInput.value.trim();
  if (!key) { showToast('Entrez votre clé API', 'error'); return; }

  setLoading(true);
  document.getElementById('content').innerHTML = '';
  currentDraft = null;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2048,
        system: `Tu es un assistant email. Lis le dernier email reçu (pas envoyé par l'utilisateur) dans Gmail et rédige une réponse.
Réponds UNIQUEMENT en JSON valide, sans markdown ni backticks :
{"email_recu":{"id":"...","sujet":"...","expediteur":"...","contenu":"..."},"reponse":{"destinataire":"...","sujet":"Re: ...","corps":"..."}}`,
        messages: [{ role: 'user', content: 'Lis mon dernier email reçu dans Gmail et propose une réponse adaptée.' }],
        mcp_servers: [{ type: 'url', url: 'https://gmailmcp.googleapis.com/mcp/v1', name: 'gmail-mcp' }]
      })
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error.message || 'Erreur API');

    let text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    text = text.replace(/```json|```/g, '').trim();

    let parsed;
    try { parsed = JSON.parse(text); }
    catch { throw new Error('Réponse inattendue du modèle'); }

    currentDraft = parsed;
    renderDraft(parsed);
    showToast('Email lu avec succès');

  } catch (e) {
    showToast(e.message, 'error');
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <p>${e.message}</p>
      </div>`;
  } finally {
    setLoading(false);
  }
}

function renderDraft(data) {
  const email = data.email_recu || {};
  const reply = data.reponse || {};

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-icon recv">📨</div>
        <div>
          <div class="card-title">Email reçu</div>
        </div>
      </div>
      <div class="card-body">
        <div class="meta-row">
          <span class="meta-key">De</span>
          <span class="meta-val">${esc(email.expediteur || '—')}</span>
        </div>
        <div class="meta-row">
          <span class="meta-key">Sujet</span>
          <span class="meta-val">${esc(email.sujet || '—')}</span>
        </div>
        <div class="divider"></div>
        <div class="msg-body">${esc(email.contenu || '—')}</div>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-header">
        <div class="card-icon send">✍️</div>
        <div>
          <div class="card-title">Réponse proposée</div>
        </div>
      </div>
      <div class="card-body">
        <div class="meta-row">
          <span class="meta-key">À</span>
          <span class="meta-val">${esc(reply.destinataire || '—')}</span>
        </div>
        <div class="meta-row">
          <span class="meta-key">Sujet</span>
          <span class="meta-val">${esc(reply.sujet || '—')}</span>
        </div>
        <div class="divider"></div>
        <textarea class="reply-textarea" id="replyBody">${esc(reply.corps || '')}</textarea>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-send" onclick="sendReply()">
        <span>📤</span> Envoyer
      </button>
      <button class="btn-cancel" onclick="cancelReply()">Annuler</button>
    </div>
  `;
}

async function sendReply() {
  if (sending) return;
  const key = keyInput.value.trim();
  const body = document.getElementById('replyBody').value.trim();
  if (!body) { showToast('Le message est vide', 'error'); return; }

  sending = true;
  const btn = document.querySelector('.btn-send');
  btn.disabled = true;
  btn.innerHTML = '<div class="loader" style="display:block;border-top-color:white"></div>';

  const reply = currentDraft.reponse;
  reply.corps = body;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 512,
        system: 'Tu envoies des emails via Gmail MCP. Après envoi, réponds uniquement avec le mot EMAIL_ENVOYE.',
        messages: [{ role: 'user', content: `Envoie cet email via Gmail:\nÀ: ${reply.destinataire}\nSujet: ${reply.sujet}\nCorps:\n${reply.corps}` }],
        mcp_servers: [{ type: 'url', url: 'https://gmailmcp.googleapis.com/mcp/v1', name: 'gmail-mcp' }]
      })
    });

    const data = await response.json();
    const text = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '';
    const ok = text.includes('EMAIL_ENVOYE') || text.toLowerCase().includes('envoy');

    if (ok) {
      document.getElementById('content').innerHTML = `
        <div class="sent-banner">
          <div class="sent-icon">🎉</div>
          <div class="sent-text">
            <h3>Réponse envoyée !</h3>
            <p>À ${esc(reply.destinataire)}</p>
          </div>
        </div>`;
      showToast('Email envoyé avec succès');
    } else {
      throw new Error('Envoi incertain — vérifiez Gmail');
    }
  } catch (e) {
    showToast(e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<span>📤</span> Envoyer';
  } finally {
    sending = false;
  }
}

function cancelReply() {
  document.getElementById('content').innerHTML = `
    <div class="empty">
      <div class="empty-icon">✋</div>
      <p>Envoi annulé.<br>Appuyez sur le bouton pour lire un nouvel email.</p>
    </div>`;
  currentDraft = null;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
